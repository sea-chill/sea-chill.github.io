<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="PhilsIcon.png"> <!-- Favicon link -->

    <title>Phillies Roster</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(255, 253, 208); /*creme color*/
            border: 20px, solid rgb(0, 45, 114); /*phillies red border*/
            color : rgb(232, 24, 40); /*phillies red color*/
            padding: 20px;
            text-align: center;
        }

        .roster-Container {
            display: flex;
            justify-content: center;
            gap:60px;
            overflow-x: auto; /* Adds horizontal scrolling only when the content overflows */
        }

        .hitter-Table {
            width:100%;
            border-collapse:collapse;
        }

        .pitcher-Table {
            width:100%;
            border-collapse:collapse;
        }

        .table-Header {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }

    </style>
 </head>

<body>

    <button onclick="window.location.href='index.html'">
    Return to Did the Phillies Win Today?
    </button>
    <br>
    <h1>Phillies Roster</h1>

    <!-- <h2 class="table-Header">Spring Training</h2> -->

    <h2 class="table-Header">Hitters</h2>

    <div class="roster-Container">
        <table class="hitter-Table">

            <thead>
                <tr>
                <th>Number</th>
                <th>Name</th>
                <th>Pos</th>
                <th>Games</th>
                <th>AB</th>
                <th>Hits</th>
                <th>Runs</th>
                <th>HR</th>
                <th>RBI</th>
                <th>AVG</th>
                </tr>
            </thead>
            <tbody id="hitterTable"></tbody>
        </table>
    </div>

    <h2 class="table-Header">Pitchers</h2>

    <div class="roster-Container">
        <table class="pitcher-Table">
            <thead>
                <tr>
                <th>Number</th>
                <th>Name</th>
                <th>Games</th>
                <th>IP</th>
                <th>W</th>
                <th>L</th>
                <th>ERA</th>
                <th>SO</th>
                </tr>
            </thead>
            <tbody id="pitcherTable"></tbody>
    </div>
    
<script>

async function fetchRoster(){

    /*types of rosters that i know work, there may be others: active, fullRoster, depthChart*/
    const url=`https://statsapi.mlb.com/api/v1/teams/143/roster/activeRoster`;
    const res=await fetch(url);
    const data=await res.json();

    if(!data.roster.length){

        document.body.innerHTML="No roster to show";

        return null;
    }

    const teams=data.roster;
    rosterCount = teams.length;
    
    for(let i = 0; i < rosterCount; i++){

        let [gamesPlayed, atBats, hits, runs, rbi, avg, homeRuns, inningsPitched, wins, losses, era, strikeOuts] = [0,'--','--','--','--','--','--','--','--','--','--','--'];
        
        let playerID = data.roster[i]?.person.id;
        let jersey = data.roster[i]?.jerseyNumber;
        let name = data.roster[i]?.person.fullName;
        let field = data.roster[i]?.position.name;

        /*Game Type idenfier is S for Spring Training, R for Regular Season and P for Postseason*/

        const statsURL = `https://statsapi.mlb.com/api/v1/people/${playerID}/stats?stats=season&season=2026&gameType=R`;
        const statsRes=await fetch(statsURL);
        const personStatsData=await statsRes.json();

        if (personStatsData.stats.length > 0) {
            
            gamesPlayed = personStatsData.stats[0].splits[0].stat.gamesPlayed;
            atBats = personStatsData.stats[0].splits[0].stat.atBats;
            hits = personStatsData.stats[0].splits[0].stat.hits;
            runs = personStatsData.stats[0].splits[0].stat.runs;
            rbi = personStatsData.stats[0].splits[0].stat.rbi;
            homeRuns = personStatsData.stats[0].splits[0].stat.homeRuns;
            avg = personStatsData.stats[0].splits[0].stat.avg;
            inningsPitched = personStatsData.stats[0].splits[0].stat.inningsPitched;
            wins = personStatsData.stats[0].splits[0].stat.wins;
            losses = personStatsData.stats[0].splits[0].stat.losses;
            era = personStatsData.stats[0].splits[0].stat.era;
            strikeOuts = personStatsData.stats[0].splits[0].stat.strikeOuts;
        }
            
        if (field === "Pitcher"){

            const row=`
            <tr>
            <td>${jersey}</td>
            <td>${name}</td>
            <td>${gamesPlayed}</td>
            <td>${inningsPitched}</td>
            <td>${wins}</td>
            <td>${losses}</td>
            <td>${era}</td>
            <td>${strikeOuts}</td>
            </tr>
            `;

            document.getElementById("pitcherTable").insertAdjacentHTML("beforeend",row);
        }
        else {
        const row=`
            <tr>
            <td>${jersey}</td>
            <td>${name}</td>
            <td>${field}</td>
            <td>${gamesPlayed}</td>
            <td>${atBats}</td>
            <td>${hits}</td>
            <td>${runs}</td>
            <td>${homeRuns}</td>
            <td>${rbi}</td>
            <td>${avg}</td>
            </tr>
            `;
            
        document.getElementById("hitterTable").insertAdjacentHTML("beforeend",row);
        }
    }
        
return null;
}

fetchRoster();
    
</script>

</body>
</html>
