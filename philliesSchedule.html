<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="PhilsIcon.png"> <!-- Favicon link -->

    <title>Phillies Schedule</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(255, 253, 208); /*creme color*/
            border: 20px, solid rgb(0, 45, 114); /*phillies red border*/
            color : rgb(232, 24, 40); /*phillies red color*/
            padding: 20px;
            text-align: center;
        }

        .schedule-Container {
            display: flex;
            justify-content: center;
            gap:60px;
            overflow-x: auto; /* Adds horizontal scrolling only when the content overflows */
        }

        .schedule-Table {
            width:100%;
            border-collapse:collapse;
        }

        .pitcher-Table {
            width:100%;
            border-collapse:collapse;
        }

        .h2 {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
        .home {
            color:rgb(232, 24, 40); /*phillies red color for home games in schedule*/
        }
        .away {
            color:rgb(0, 45, 114); /*phillies blue color for away games in schedule*/
        }

    </style>
 </head>

<body>

    <button onclick="window.location.href='index.html'">
    Return to Did the Phillies Win Today?
    </button>

    <h1>2026 Philadelphia Phillies Schedule</h1>
    <!-- <p class = "h2" id="philsRecord"></p> -->

    <div class="schedule-Container">
        <table class="schedule-Table">
            <thead>
                <tr>
                <th>Day</th>
                <th>Date</th>
                <th>Time</th>
                <th>Opponent</th>
                <th>Opponent Record</th>
                <th>Phillies Record</th>
                <th>Home/Away</th>
                <th>Result / Score</th>
                </tr>
            </thead>
            <tbody id="scheduleTable"></tbody>
        </table>
    </div>
    <br>
    <button onclick="window.location.href='index.html'">
    Return to Did the Phillies Win Today?
    </button>

<script>

/*Get Schedule Data*/

async function loadScheduleData() {

    /* using the game type parameter S - spring training, R - regular season, D - postseason */
    /* using the hydrate parameter to get the probable pitchers for each game, which is what I will use to add that info to the schedule page*/
    const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=143&startDate=2026-02-21&endDate=2026-10-30&gameTypes=R&hydrate=probablePitcher`;
    const res =await fetch(url);
    const schedAPI =await res.json();

        const games = schedAPI.dates.flatMap(date => date.games);
        /*let record = "N/A";
        let resultScore = "TBD";*/
    
        games.forEach((game, i) => {
            let gameDate = new Date(game.gameDate);

            let compareDate = gameDate.toISOString().split('T')[0]; // Get the date part in YYYY-MM-DD format

            let gamePk = game.gamePk; // Get the gamePk for the current game

            let day = gameDate.toLocaleDateString('en-US', { weekday: 'long' });
           
            let date = gameDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            let time = gameDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });
            
            let opponent = game.teams.home.team.id === 143 ? game.teams.away.team.name : game.teams.home.team.name;
            
            let record = game.teams.home.team.id === 143 ? game.teams.home.leagueRecord.wins - game.teams.home.leagueRecord.losses : game.teams.away.leagueRecord.wins - game.teams.away.leagueRecord.losses;
            
            let philsRecord = game.teams.home.team.id === 143 ? game.teams.home.leagueRecord.wins - game.teams.home.leagueRecord.losses : game.teams.away.leagueRecord.wins - game.teams.away.leagueRecord.losses;
            
            let homeAway = game.teams.home.team.id === 143 ? "Home" : "Away";
            
            let resultScore = game.status.abstractGameCode === "F" ? `${game.teams.home.score}-${game.teams.away.score}` : "---";
            
            /*let result = game.teams.home.team.id === 143 ? game.teams.home.score > game.teams.away.score ? "W" : game.teams.home.score < game.teams.away.score ? "L"  : "--" : game.teams.away.score > game.teams.home.score ? "W" : game.teams.away.score < game.teams.home.score ? "L" : "--";*/
            
            let result = "--";

            let testResult = game.status.abstractGameCode;

            const isHome = game.teams.home.team.id === 143;

            if (testResult === "F") {
                /*const isHome = game.teams.home.team.id === 143;*/

                const philliesScore = isHome
                    ? game.teams.home.score
                    : game.teams.away.score;

                const opponentScore = isHome
                    ? game.teams.away.score
                    : game.teams.home.score;

                if (philliesScore > opponentScore) {
                    result = "W";
                } else if (philliesScore < opponentScore) {
                    result = "L";
                } else {
                    result = "--";
                }
            }
            
            let currentDate = new Date();
            let philsProbablePitcher = "TBD";
            let opponentProbablePitcher = "TBD";
            if (gameDate> currentDate) {
                record = "N/A";
                philsRecord = "N/A";
                resultScore = "TBD";
                if (isHome) {
                    philsProbablePitcher = game.teams.home.probablePitcher ? game.teams.home.probablePitcher.fullName : "TBD";
                    opponentProbablePitcher = game.teams.away.probablePitcher ? game.teams.away.probablePitcher.fullName : "TBD";
                } else {
                    philsProbablePitcher = game.teams.away.probablePitcher ? game.teams.away.probablePitcher.fullName : "TBD";
                    opponentProbablePitcher = game.teams.home.probablePitcher ? game.teams.home.probablePitcher.fullName : "TBD";
                }
            } else if (game.status.abstractGameCode === "F") {
                record = game.teams.home.team.id !== 143 ?`${game.teams.home.leagueRecord.wins} - ${game.teams.home.leagueRecord.losses}` : `${game.teams.away.leagueRecord.wins} - ${game.teams.away.leagueRecord.losses}`;
                philsRecord = game.teams.home.team.id === 143 ? `${game.teams.home.leagueRecord.wins} - ${game.teams.home.leagueRecord.losses}` : `${game.teams.away.leagueRecord.wins} - ${game.teams.away.leagueRecord.losses}`;
                resultScore = `${game.teams.home.score}-${game.teams.away.score}`;
            } else {
                record = game.teams.home.team.id === 143 ?`${game.teams.home.leagueRecord.wins} - ${game.teams.home.leagueRecord.losses}` : `${game.teams.away.leagueRecord.wins} - ${game.teams.away.leagueRecord.losses}`;
                philsRecord = game.teams.home.team.id === 143 ? `${game.teams.home.leagueRecord.wins} - ${game.teams.home.leagueRecord.losses}` : `${game.teams.away.leagueRecord.wins} - ${game.teams.away.leagueRecord.losses}`;
                resultScore = "TBD";
            }

            let totalResult = `${result} / ${resultScore}`;
            
            const row=`
                <tr>
                <td>${day}</td>
                <td>${date}</td>
                <td>${time}</td>
                <td>${opponent}</td>
                <td>${record}</td>
                <td>${philsRecord}</td>
                <td>${homeAway}</td>
                <td><a href="boxScore.html?gamePk=${gamePk}&philsProbablePitcher=${encodeURIComponent(philsProbablePitcher)}&opponentProbablePitcher=${encodeURIComponent(opponentProbablePitcher)}&comp=${encodeURIComponent(compareDate)}">${totalResult}</a></td>
                </tr>
                `;
                /*<td>${result} / ${resultScore}</td>*/
                /*<a href="startingLineup.html">View Starting Lineup</a>*/  

        document.getElementById("scheduleTable").insertAdjacentHTML("beforeend",row);
        /*document.getElementById("philsRecord").innerText = `Phillies Record: ${philsRecord}`;*/
      });
}
loadScheduleData();

</script>

</body>
</html>
