<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="PhilsIcon.png"> <!-- Favicon link -->

<title>Phillies Lineup Card</title>

<link rel="stylesheet" href="style.css">

<style>
    
    .game-Status {
        height: 50vh;
        background-image: repeating-linear-gradient(to right, white, white 50px, rgb(232, 24, 40) 50px,  rgb(232, 24, 40) 52px);
        background-size: 100%;
        border: 20px, solid rgb(232, 24, 40); /*phillies red border*/
        color:rgb(232, 24, 40); /*phillies red color*/
        font-size: 75px;
        font-weight: bold;
        text-align: center;
        background-size: cover;
        display: flex;
        justify-content: center; /* Centers horizontally along the main axis */
        align-items: center; /* Centers vertically along the cross axis */
    }
    </style>

</head>

<body>

<div id="phillies-color">

    <h1>Starting Lineups</h1>

    <div id="logos" class="logos"></div>

    <div class="lineup-container">

        <div class="lineup-card">

            <h2>Phillies</h2>

            <div id="philliesPitcher" class="pitcher"></div>

            <table class="lineup-table">
            <thead>
            <tr>
            <th>#</th>
            <th>Name</th>
            <th>Pos</th>
            </tr>
            </thead>
            <tbody id="philliesLineup"></tbody>
            </table>

        </div>

        <div class="lineup-card">

            <h2 id="otherTeam"></h2>

            <div id="opponentPitcher" class="pitcher"></div>

            <table class="lineup-table">
            <thead>
            <tr>
            <th>#</th>
            <th>Name</th>
            <th>Pos</th>
            </tr>
            </thead>
            <tbody id="opponentLineup"></tbody>
            </table>

        </div>

    </div>

</div>

<script>

const TEAM_ID = 143;

/* DATE */

function getTodayDate(){

    const today = new Date();

    const year = today.getFullYear();
    const month = String(today.getMonth()+1).padStart(2,"0");
    const day = String(today.getDate()).padStart(2,"0");

    return `${year}-${month}-${day}`;
}

function getDayOfWeek(){
    return new Date().getDay();
}

/* UNIFORM STYLE */

function backgroundAndTextColor(homeGame,gameHour){

    let today = getTodayDate();
    /*today = "2026-03-28"; this is opening day for the 2026 season.  I am hardcoding this for now, but I will need to update this later to check if the date is opening day for the season.  This is because they will be wearing pinstripes regardless of if it is a day or night game. */
    if (today === "2026-03-28") { /*Opening Day is March 28, 2026.  This is a special case because they will be wearing pinstripes regardless of if it is a day or night game. */
        const philliesODElement = document.getElementById("phillies-color"); 
        const stateClass = "pinstripes";
        philliesODElement.classList.add(stateClass);
        return(stateClass);
    }

    const element = document.getElementById("phillies-color");

    let stateClass;

    const dayOfWeek = getDayOfWeek();

    if(dayOfWeek===4){

        stateClass="powder-blue";

    }else if(dayOfWeek===5 && homeGame){

        stateClass="city-connect";

    }else if(gameHour<18 && homeGame){

        stateClass="creme";

    }else if(homeGame){

        stateClass="pinstripes";

    }else{

        stateClass="grey";

    }

    element.classList.add(stateClass);
}

/* FETCH GAME */

async function fetchGamePk(){

    const date = getTodayDate();
    /*const date = "2026-03-24";*/

    const url=`https://statsapi.mlb.com/api/v1/schedule?teamId=${TEAM_ID}&sportId=1&date=${date}`;

    const res=await fetch(url);

    const data=await res.json();

    if(data.dates[0] === undefined){

        document.body.innerHTML= `<div class="game-Status">No Phillies game today</div>`;

        return
    }

    gamePk=data.dates[0].games[0].gamePk;

    let numGames = data.dates[0].totalGames;

    const game=data.dates[0].games[0];

    const isHomeGame=game.teams.home.team.id===TEAM_ID;

    const gameHour=new Date(game.gameDate).getHours();

    backgroundAndTextColor(isHomeGame,gameHour);

    return (gamePk);
}

/* LOAD LINEUPS */

async function loadLineups(){

    /*Starters: Have values that are multiples of 100 (e.g., 100, 200, 300, ..., 900). 
    These correspond to their original position in the batting order (1st through 9th).*/

    const gamePk=await fetchGamePk();

    if (gamePk === 'no-game') return;

    if(!gamePk) return;

    const url=`https://statsapi.mlb.com/api/v1/game/${gamePk}/boxscore`;

    const res=await fetch(url);

    const data=await res.json();

    const home=data.teams.home;
    const away=data.teams.away;

    const phillies=home.team.id===TEAM_ID?home:away;
    const opponent=home.team.id===TEAM_ID?away:home;

    /* LOGOS */

    document.getElementById("logos").innerHTML=`
    <img src="https://www.mlbstatic.com/team-logos/${phillies.team.id}.svg">
    <img src="https://www.mlbstatic.com/team-logos/${opponent.team.id}.svg">
    `;

    /* Other Team Info */

    /*let versus = opponent.team.clubName;*/
    const versus = document.getElementById('otherTeam');
    versus.textContent = opponent.team.clubName;

    /* STARTING PITCHERS */

    const philliesSP=phillies.pitchers[0];
    const opponentSP=opponent.pitchers[0];

    if (!philliesSP || !opponentSP) {
        document.getElementById("philliesPitcher").innerText = "";
        document.getElementById("opponentPitcher").innerText = "";
        return;
    }

    document.getElementById("philliesPitcher").innerText=
    "SP: #"+phillies.players["ID"+philliesSP].jerseyNumber+
    " "+phillies.players["ID"+philliesSP].person.fullName;

    document.getElementById("opponentPitcher").innerText=
    "SP: #"+opponent.players["ID"+opponentSP].jerseyNumber+
    " "+opponent.players["ID"+opponentSP].person.fullName;

    /* LINEUP TABLE */

    function renderLineup(team,element){

    const lineup=team.batters;

    lineup.forEach((playerId,i)=>{

       const player=team.players["ID"+playerId];

        if (player.battingOrder % 100 === 0 && player.position.abbreviation !== "P") {

            const player=team.players["ID"+playerId];

            const order = player.battingOrder / 100;
            const number=player.jerseyNumber||"";
            const name=player.person.fullName;
            const pos=player.position.abbreviation;

            const row=`
            <tr>
            <td>${order}</td>
            <td>#${number} ${name}</td>
            <td>${pos}</td>
            </tr>
            `;

            document.getElementById(element).insertAdjacentHTML("beforeend",row);

        }

    /*const player=team.players["ID"+playerId];*/

    /*const number=player.jerseyNumber||"";
    const name=player.person.fullName;
    const pos=player.position.abbreviation;

    const row=`
    <tr>
    <td>${i+1}</td>
    <td>#${number} ${name}</td>
    <td>${pos}</td>
    </tr>
    `;

    document.getElementById(element).insertAdjacentHTML("beforeend",row);*/

    });

    }

    renderLineup(phillies,"philliesLineup");
    renderLineup(opponent,"opponentLineup");

}

loadLineups();

</script>

<button onclick="window.location.href='index.html'">
  Return to Did the Phillies Win Today?
</button>

</body>
</html>
