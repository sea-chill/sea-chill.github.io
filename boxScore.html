<script>

const params = new URLSearchParams(window.location.search);
let schedGamePk = params.get("gamePk");
const philsProbablePitcher = params.get("philsProbablePitcher");
const opponentProbablePitcher = params.get("opponentProbablePitcher");
const compareDate = params.get("comp");
const ppCompareDate = new Date(compareDate + "T00:00:00");
let gamePk;
const displayCompareDate = compareDate ? new Date(compareDate + "T00:00:00").toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
    }) : null;

const today = new Date();
today.setHours(0, 0, 0, 0); /* Set time to midnight to compare only the date portion*/

const localDate = [
  today.getFullYear(),
  String(today.getMonth() + 1).padStart(2, "0"),
  String(today.getDate()).padStart(2, "0")
].join("-");

/* get the win, loss, save records for the pitchers in this game and display them in the decisions section of the box score*/

async function wlsRecords(winnerID, loserID, saveID) {
    let winnerRecord = "";
    let loserRecord = "";
    let saves = "";
    let startDate = "2026-03-26"; /*Opening Day for the 2026 season.*/
    let endDate = compareDate ? compareDate : localDate; /*if compareDate is provided, use that as the end date for the record calculation, otherwise use today as the end date to get the most up to date record for the pitchers in this game*/

    if (winnerID) {
        /*const winnerURL = `https://statsapi.mlb.com/api/v1/people/${winnerID}/stats?stats=season&season=2026&gameType=R`;*/
        const winnerURL = `https://statsapi.mlb.com/api/v1/people/${winnerID}/stats?stats=byDateRange&startDate=${startDate}&endDate=${endDate}&gameType=R`;
        const winnerRes = await fetch(winnerURL);
        const winnerStatsData = await winnerRes.json();
        winnerRecord = `${winnerStatsData.stats[0].splits[0].stat.wins} - ${winnerStatsData.stats[0].splits[0].stat.losses}`;
    }

    if (loserID) {
        /*const loserURL = `https://statsapi.mlb.com/api/v1/people/${loserID}/stats?stats=season&season=2026&gameType=R`;*/
        const loserURL = `https://statsapi.mlb.com/api/v1/people/${loserID}/stats?stats=byDateRange&startDate=${startDate}&endDate=${endDate}&gameType=R`;
        const loserRes = await fetch(loserURL);
        const loserStatsData = await loserRes.json();
        loserRecord = `${loserStatsData.stats[0].splits[0].stat.wins} - ${loserStatsData.stats[0].splits[0].stat.losses}`  ;
    }

    if (saveID) {
        /*const saveURL = `https://statsapi.mlb.com/api/v1/people/${saveID}/stats?stats=season&season=2026&gameType=R`;*/
        const saveURL = `https://statsapi.mlb.com/api/v1/people/${saveID}/stats?stats=byDateRange&startDate=${startDate}&endDate=${endDate}&gameType=R`;
        const saveRes = await fetch(saveURL);
        const saveStatsData = await saveRes.json();
        saves = `${saveStatsData.stats[0].splits[0].stat.saves}`;
    } else {
        saves = "";
    }

    return {
        winnerRecord,
        loserRecord,
        saves
    };
}

/* Day of week */

function getDayOfWeek(){
    return new Date().getDay();
}

/* UNIFORM STYLE */

function backgroundAndTextColor(homeGame,gameHour){

    /*I don't need this block of text since I already have the date in the right format with the 
    global code and the variables localDate (for today) or compareDate for past or future game*/

    /*let today = new Date();
    let year = today.getFullYear();
    let month = String(today.getMonth() + 1).padStart(2, "0"); // Months are zero-indexed
    let day = String(today.getDate()).padStart(2, "0");
    today = `${year}-${month}-${day}`;*/

    /*this code sets the date for either today or a past/future date*/

    let specialDate = "";
    let dayOfWeek;

    if (ppCompareDate > today || ppCompareDate < today) {
        specialDate = compareDate;
        dayOfWeek = ppCompareDate.getDay();
    } else {
        specialDate = localDate;
        dayOfWeek = today.getDay();
    }

    /*today = "2026-03-26"; this is opening day for the 2026 season.*/
    if (specialDate === "2026-03-26") { /*Opening Day is March 28, 2026.  This is a special case because they will be wearing pinstripes regardless of if it is a day or night game. */
        const philliesODElement = document.getElementById("phillies-color"); 
        const stateClass = "pinstripes";
        philliesODElement.classList.add(stateClass);
        return(stateClass);
    }

    const element = document.getElementById("phillies-color");

    let stateClass;

    /*I need to use either today's game or a previous game to determine the uniform style*/
    /*const dayOfWeek = getDayOfWeek();*/

    /*get day of week and hour of game to determine uniform style.  This is for the date of the game and 
    not necessarily today's date since the user could be viewing a past or future game from the schedule page.
    I already have game hour so just need day of week for the date of the game*/  
    
    if(dayOfWeek===4){

        stateClass="powder-blue";

    }else if(dayOfWeek===5 && homeGame){

        stateClass="city-connect";

    }else if(gameHour<18 && homeGame){

        stateClass="creme";

    }else if(homeGame){

        stateClass="pinstripes";

    }else{

        stateClass="grey";

    }

    element.classList.add(stateClass);
}

/*const gamePk = 831605;*/

async function loadGameData() {

    /*Removing this block of code since it is redundant with the global code that sets the date*/

    /*let dayTime = new Date();
    let year = String(dayTime.getFullYear());
    let month = String(dayTime.getMonth() + 1).padStart(2, "0"); // Months are zero-indexed
    let day = String(dayTime.getDate()).padStart(2, "0");
    let today = `${year}-${month}-${day}`;*/
    /*let today = "2026-03-28"; /*test date*/

    /*check the date to see if ppCompareDate is after today, if it is then we know the user is trying to view 
    a future game from the schedule page and we should display the probable pitchers for that game instead 
    of the box score information since there will be no data to pull for the box score yet.*/

    let gameDay;

    if (ppCompareDate > today || ppCompareDate < today) {
        gameDay = compareDate
    } else {
        gameDay = localDate;
    }

    const url = `https://statsapi.mlb.com/api/v1/schedule?teamId=143&sportId=1&date=${gameDay}`;
    const res = await fetch(url);
    const schedAPI = await res.json();

    /*4 cases for the gamePk parameter
    1. No game today - display message that there is no game and hide all other info on the page
    2. Game today
    3. Game in the past
    4. Game in the future */

    if (!schedAPI.dates || schedAPI.dates.length === 0) {
        let pageTitle = "";
        document.getElementById("pageTitle").innerText = pageTitle;
        document.getElementById("boxscore").innerHTML = "<div class='game-Status'><p>No game scheduled for today</p></div>";
        return;
    }

    /*get paramters from the schedule URL to determine which game to pull data for and the probable pitchers for that game to display on the box score page*/
    /*const params = new URLSearchParams(window.location.search);
    let schedGamePk = params.get("gamePk");
    const philsProbablePitcher = params.get("philsProbablePitcher");
    const opponentProbablePitcher = params.get("opponentProbablePitcher");
    const compareDate = params.get("comp");
    let gamePk;*/

    if (ppCompareDate < today) {
        gamePk = schedGamePk;
    } else if (ppCompareDate > today) {
        gamePk = schedGamePk;
    } else {
        gamePk = schedAPI.dates[0]?.games[0]?.gamePk || null;
    }

    /*good place to determine if game is today, in the past or the future from the schedule page*/
    /*gamePk = schedAPI.dates[0]?.games[0]?.gamePk || null;*/
    /*const gamePk = 831605;*/
    /*const pageTitle = "Phillies Box Score - " + formatDate(schedAPI.dates[0].date); - if i want the date use this line*/
    /*const pageTitle = "Phillies Box Score";
    document.getElementById("pageTitle").innerText = pageTitle;*/
    const TEAM_ID = 143;
    const game=schedAPI.dates[0].games[0];
    const isHomeGame=game.teams.home.team.id===TEAM_ID;
    const gameHour=new Date(game.gameDate).getHours();

    backgroundAndTextColor(isHomeGame,gameHour);

    const [boxRes, lineRes, liveRes] = await Promise.all([
        fetch(`https://statsapi.mlb.com/api/v1/game/${gamePk}/boxscore`),
        fetch(`https://statsapi.mlb.com/api/v1/game/${gamePk}/linescore`),
        fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live`)
    ]);

    
    const boxData = await boxRes.json();
    const lineData = await lineRes.json();
    const liveData = await liveRes.json();

    displayFullGame(boxData, lineData, liveData, schedAPI);
}

function formatDate(dateString) {
    return new Date(dateString).toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
    });
}

function formatTime(dateTimeString) {
    return new Date(dateTimeString).toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit"
    });
}

function buildBattingTable(team) {
    let html = `
        <table>
            <tr>
                <th>#</th>
                <th>Pos</th>
                <th>Player</th>
                <th>AB</th>
                <th>R</th>
                <th>H</th>
                <th>RBI</th>
                <th>BB</th>
                <th>SO</th>
            </tr>
    `;  
       
    let orderTest = 0;

    for (i = 0; i < team.batters.length; i++) {
        orderTest = (Math.round(orderTest / 100) * 100) + 100;
        for (j = 0; j < team.batters.length; j++) {
            const player = team.batters[j];
            idPlayer = 'ID' + player;
            let order = team.players[idPlayer].battingOrder;
            if (order == orderTest) {
                if (orderTest % 100 !== 0) {
                    html += `
                    <tr>
                        <td>${team.players[idPlayer].jerseyNumber || ""}</td>
                        <td>${team.players[idPlayer].position.abbreviation}</td>
                        <td><div class="substitute">--${team.players[idPlayer].person.fullName}</div></td>
                        <td>${team.players[idPlayer].stats.batting.atBats}</td>
                        <td>${team.players[idPlayer].stats.batting.runs}</td>
                        <td>${team.players[idPlayer].stats.batting.hits}</td>
                        <td>${team.players[idPlayer].stats.batting.rbi}</td>
                        <td>${team.players[idPlayer].stats.batting.baseOnBalls}</td>
                        <td>${team.players[idPlayer].stats.batting.strikeOuts}</td>
                    </tr>
                `;
                orderTest++;
                } else {
                html += `
                    <tr>
                        <td>${team.players[idPlayer].jerseyNumber || ""}</td>
                        <td>${team.players[idPlayer].position.abbreviation}</td>
                        <td>${team.players[idPlayer].person.fullName}</td>
                        <td>${team.players[idPlayer].stats.batting.atBats}</td>
                        <td>${team.players[idPlayer].stats.batting.runs}</td>
                        <td>${team.players[idPlayer].stats.batting.hits}</td>
                        <td>${team.players[idPlayer].stats.batting.rbi}</td>
                        <td>${team.players[idPlayer].stats.batting.baseOnBalls}</td>
                        <td>${team.players[idPlayer].stats.batting.strikeOuts}</td>
                    </tr>
                `;
                orderTest++;
                }
            }
            else {
                continue;
            }
        }
    }               
html += `</table>`;
return html;
}

function buildPitchingTable(team) {
    let html = `
        <table>
            <tr>
                <th>#</th>
                <th>Pitcher</th>
                <th>IP</th>
                <th>H</th>
                <th>R</th>
                <th>ER</th>
                <th>BB</th>
                <th>SO</th>
                <th>NP</th>
            </tr>
    `;

    for (j = 0; j < team.pitchers.length; j++) {
            const player = team.pitchers[j];
            idPlayer = 'ID' + player;
            html += `
                <tr>
                    <td>${team.players[idPlayer].jerseyNumber || ""}</td>
                    <td>${team.players[idPlayer].person.fullName}</td>
                    <td>${team.players[idPlayer].stats.pitching.inningsPitched}</td>
                    <td>${team.players[idPlayer].stats.pitching.hits}</td>
                    <td>${team.players[idPlayer].stats.pitching.runs}</td>
                    <td>${team.players[idPlayer].stats.pitching.earnedRuns}</td>
                    <td>${team.players[idPlayer].stats.pitching.baseOnBalls}</td>
                    <td>${team.players[idPlayer].stats.pitching.strikeOuts}</td>
                    <td>${team.players[idPlayer].stats.pitching.pitchesThrown || "0"}</td>
                </tr>
            `;
    }

    html += `</table>`;
    return html;
}

function buildLineScore(lineData, boxData) {
        
    /*if (lineData.innings.length === 0) {
        return "<p>Game has not started yet</p>";
    }*/

    let html = `<h2></h2><table><tr><th>Team</th>`;

    let minInnings = 9;

    if (lineData.innings.length > 9) {
        minInnings = lineData.innings.length;
    }
    
    const safeInnings = Array.from({length: minInnings}, (_, i) =>
        lineData.innings[i]);
    safeInnings.forEach((inning, i) => {
        html += `<th>${i + 1}</th>`;}
    );

    html += `<th>R</th><th>H</th><th>E</th></tr>`;

        ["away", "home"].forEach(side => {
            html += `<tr><td>${boxData.teams[side].team.teamName}</td>`;

            safeInnings.forEach(inning => {
                if (!inning) {
                    html += `<td>--</td>`;
                } else {
                html += `<td>${inning[side]?.runs ?? '--'}</td>`;
                }
            });

            html += `
                <td>${lineData.teams[side].runs ?? '0'}</td>
                <td>${lineData.teams[side].hits ?? '0'}</td>
                <td>${lineData.teams[side].errors ?? '0'}</td>
            </tr>`;
        });
    html += `</table>`;
    return html;  

}

 async function displayFullGame(boxData, lineData, liveData, schedAPI) {

    let venue = "N/A";
    let attendance = "N/A";
    let firstPitch = "N/A";
    let timeOfGame = "N/A";
    let weather = "N/A";
    let wind = "N/A";

    boxData.info.forEach((info,i) => {
        const label = info.label;
        const xlabel = info.value;
        if (info.label === "Venue") {
            venue = info.value;
        } else if (info.label === "Att") {
            attendance = info.value;
        } else if (info.label === "First pitch") {
            firstPitch = info.value;
        } else if (info.label === "T") {
            timeOfGame = info.value;
        } else if (info.label === "Weather") {
            weather = info.value;
        } else if (info.label === "Wind") {
            wind = info.value;
        }
    });
    
    firstPitch = formatTime(schedAPI.dates[0].games[0].gameDate);

        document.getElementById("gameInfo").innerText =
        `${venue} | Attendance: ${attendance}`;
    document.getElementById("weatherInfo").innerText =
        `Weather: ${weather} | Wind: ${wind}`;
    document.getElementById("timeInfo").innerText =
        `First Pitch: ${firstPitch} | Duration: ${timeOfGame}`;

    const home = boxData.teams.home;
    const away = boxData.teams.away;

    const phillies = home.team.id === 143 ? home : away;
    const opponent = home.team.id === 143 ? away : home;

    /*const attendance = boxData.gameData.gameInfo.attendance || "N/A";*/

    const today = new Date();
    let formattedDate = today.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
    });
   
    document.title = `Phillies Box Score - ${displayCompareDate || formattedDate}`;
    document.getElementById("pageTitle").innerText =
        `Phillies Box Score - ${displayCompareDate || formattedDate}`;

    // Logos
    document.getElementById("logos").innerHTML = `
        <img src="https://www.mlbstatic.com/team-logos/${phillies.team.id}.svg">
        <img src="https://www.mlbstatic.com/team-logos/${opponent.team.id}.svg">
    `;

    if (ppCompareDate > today) {
        document.getElementById("boxscore").innerHTML = "<div class='score'><p>Probable Pitchers</p></div>";
        document.getElementById("boxscore").innerHTML += `
            <div class="inning">
                <div><strong>${phillies.team.name}:</strong> ${philsProbablePitcher || "TBD"}</div>
                <div><strong>${opponent.team.name}:</strong> ${opponentProbablePitcher || "TBD"}</div>
            </div>
        `;
        return;
    }

    if (lineData.innings.length === 0) {
        document.getElementById("boxscore").innerHTML = "<div class='phillies-color'><p>Game scheduled for later today</p></div>";
        return;
    } 
    
    // Decisions
    let decisionsHTML = "";
    
    if (liveData.liveData.decisions) {
        
        /*get records and number of saves for the pitchers in this game*/
        let winnerID = liveData.liveData.decisions.winner?.id;
        let loserID = liveData.liveData.decisions.loser?.id;
        let saveID = liveData.liveData.decisions.save?.id;
        let save = "";

        let { winnerRecord, loserRecord, saves } = await wlsRecords(winnerID, loserID, saveID);

        if (saves) {
                save = `${liveData.liveData.decisions.save?.fullName} (${saves})`;
        } else {
                save = 'None';
            }

        /*<div><strong>Save:</strong> ${liveData.liveData.decisions.save?.fullName || "None"} (${saves})</div>*/
        decisionsHTML = `
            <div><strong>WP:</strong> ${liveData.liveData.decisions.winner?.fullName || "N/A"} (${winnerRecord})</div>
            <div><strong>LP:</strong> ${liveData.liveData.decisions.loser?.fullName || "N/A"} (${loserRecord})</div>
            <div><strong>Save: </strong> ${save}</div>
        `;
    }

    // Current Inning

    let currentInning = "";

    if (liveData.gameData.status.abstractGameCode === "F"){
        currentInning = "Final";
    } else if (liveData.gameData.status.abstractGameCode === "O") {
        currentInning = "Pre-Game";
    } else if (liveData.gameData.status.abstractGameCode === "L") {
        currentInning = `${lineData.inningState} ${lineData.currentInningOrdinal}`;    
    } else {
        /*currentInning = `${lineData.inningState || "N/A"} ${lineData.currentInningOrdinal || ""}`;*/
        currentInning = "";
    }

    let currentCount = "";
    let batterName = "";
    let firstBase = "";
    let secondBase = "";
    let thirdBase = "";
    let onBase = "";

    if (lineData.inningState === "Middle" || lineData.inningState === "End") {
        currentCount = "";
        batterName = `Coming up: ${lineData.offense.batter.fullName} || ${lineData.offense.onDeck.fullName} || ${lineData.offense.inHole.fullName}`;
    } else if (schedAPI.dates[0].games[0].status.abstractGameCode === "F" || schedAPI.dates[0].games[0].status.abstractGameCode !== "L") {
        currentCount = "";
        batterName = "";
    } else {
        currentCount = `Balls:${lineData.balls} Strikes:${lineData.strikes} Outs:${lineData.outs}`;
        batterName = `At Bat: ${lineData.offense.batter.fullName || "N/A"}`;
        if (lineData.offense.first) {
            firstBase = `First: ${lineData.offense.first.fullName}`;
            if (lineData.offense.second || lineData.offense.third) {
                firstBase = `First: ${lineData.offense.first.fullName} ||`;
            }
        } else {
            firstBase = "";
        }
        if (lineData.offense.second) {
            secondBase = `Second: ${lineData.offense.second.fullName}`;
            if (lineData.offense.third) {
                secondBase = `Second: ${lineData.offense.second.fullName} ||`;
            }
        } else {
            secondBase = "";
        }
        if (lineData.offense.third) {
            thirdBase = `Third: ${lineData.offense.third.fullName}`;
        } else {
            thirdBase = "";
        }
        if (!firstBase && !secondBase && !thirdBase) {
            onBase = "Bases Empty";
        } else {
            onBase = `On Base: ${firstBase} ${secondBase} ${thirdBase}`;
        }
    }

    let html = `
        <div class="box-container">

            <div class="score">
                ${phillies.team.name} ${phillies.teamStats.batting.runs} - 
                ${opponent.team.name} ${opponent.teamStats.batting.runs}
            </div>

            <div class="inning">
                ${currentInning}
            </div>

            <div class="count">
                ${currentCount}
            </div>

            <div class="count">
                ${batterName}
            </div>

            <div class="count">
                 ${onBase}
            </div>

            ${decisionsHTML}

            ${buildLineScore(lineData, boxData)}

            <h2>${phillies.team.name} Batting</h2>
            ${buildBattingTable(phillies)}

            <h2>${phillies.team.name} Pitching</h2>
            ${buildPitchingTable(phillies)}

            <h2>${opponent.team.name} Batting</h2>
            ${buildBattingTable(opponent)}

            <h2>${opponent.team.name} Pitching</h2>
            ${buildPitchingTable(opponent)}

        </div>
    `;

    document.getElementById("boxscore").innerHTML = html;

}
