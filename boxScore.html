 <!DOCTYPE html>
<html>
<head>
    <title>Phillies Box Score</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            /*background-color: #0c2340;*/
            /*color: white;*/
            padding: 20px;
            text-align: center;
        }

        /*h1 {
            color: #e81828;
        }*/

        .info {
            margin-bottom: 15px;
        }

        .logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 15px;
        }

        .logos img {
            height: 70px;
        }

        .box-container {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .score {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 30px;
            color: #e81828;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: center;
        }

        th {
            background-color: #e81828;
            color: white;
        }
    </style>
</head>

<body>

<div id="phillies-color">
    <button onclick="window.location.href='index.html'">
    Return to Did the Phillies Win Today?
    </button>
    <h1 id="pageTitle">Phillies Box Score</h1>
    <div class="info" id="gameInfo"></div>
    <div class="info" id="timeInfo"></div>
    <div class="info" id="weatherInfo"></div>  
    <div id="logos" class="logos"></div>
    <div id="boxscore"></div>
</div>

<script>

/* Day of week */

function getDayOfWeek(){
    return new Date().getDay();
}

/* UNIFORM STYLE */

function backgroundAndTextColor(homeGame,gameHour){

    const element = document.getElementById("phillies-color");

    let stateClass;

    const dayOfWeek = getDayOfWeek();

    if(dayOfWeek===4){

        stateClass="powder-blue";

    }else if(dayOfWeek===5 && homeGame){

        stateClass="city-connect";

    }else if(gameHour<18 && homeGame){

        stateClass="creme";

    }else if(homeGame){

        stateClass="pinstripes";

    }else{

        stateClass="grey";

    }

    element.classList.add(stateClass);
}

/*const gamePk = 831533; */

async function loadGameData() {

    dayTime = new Date();
    year = String(dayTime.getFullYear());
    month = String(dayTime.getMonth() + 1).padStart(2, "0"); // Months are zero-indexed
    day = String(dayTime.getDate()).padStart(2, "0");
    let today = `${year}-${month}-${day}`;

    const url = `https://statsapi.mlb.com/api/v1/schedule?teamId=143&sportId=1&date=${today}`;
    const res = await fetch(url);
    const schedAPI = await res.json();
    const gamePk = schedAPI.dates[0]?.games[0]?.gamePk || null;

    const TEAM_ID = 143;
    const game=schedAPI.dates[0].games[0];
    const isHomeGame=game.teams.home.team.id===TEAM_ID;
    const gameHour=new Date(game.gameDate).getHours();

    backgroundAndTextColor(isHomeGame,gameHour);

    const [boxRes, lineRes, liveRes] = await Promise.all([
        fetch(`https://statsapi.mlb.com/api/v1/game/${gamePk}/boxscore`),
        fetch(`https://statsapi.mlb.com/api/v1/game/${gamePk}/linescore`),
        fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live`)
    ]);

    const boxData = await boxRes.json();
    const lineData = await lineRes.json();
    const liveData = await liveRes.json();

    displayFullGame(boxData, lineData, liveData);
}

function formatDate(dateString) {
    return new Date(dateString).toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
    });
}

function formatTime(dateTimeString) {
    return new Date(dateTimeString).toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit"
    });
}

function buildBattingTable(team) {
    let html = `
        <table>
            <tr>
                <th>#</th>
                <th>Pos</th>
                <th>Player</th>
                <th>AB</th>
                <th>R</th>
                <th>H</th>
                <th>RBI</th>
                <th>BB</th>
                <th>SO</th>
            </tr>
    `;

    for (let id in team.players) {
        const player = team.players[id];

        if (player.stats.batting && player.stats.batting.atBats > 0) {
            html += `
                <tr>
                    <td>${player.jerseyNumber || ""}</td>
                    <td>${player.position.abbreviation}</td>
                    <td>${player.person.fullName}</td>
                    <td>${player.stats.batting.atBats}</td>
                    <td>${player.stats.batting.runs}</td>
                    <td>${player.stats.batting.hits}</td>
                    <td>${player.stats.batting.rbi}</td>
                    <td>${player.stats.batting.baseOnBalls}</td>
                    <td>${player.stats.batting.strikeOuts}</td>
                </tr>
            `;
        }
    }

    html += `</table>`;
    return html;
}

function buildPitchingTable(team) {
    let html = `
        <table>
            <tr>
                <th>#</th>
                <th>Pitcher</th>
                <th>IP</th>
                <th>H</th>
                <th>R</th>
                <th>ER</th>
                <th>BB</th>
                <th>SO</th>
            </tr>
    `;

    for (let id in team.players) {
        const player = team.players[id];

        if (player.stats.pitching && player.stats.pitching.inningsPitched) {
            html += `
                <tr>
                    <td>${player.jerseyNumber || ""}</td>
                    <td>${player.person.fullName}</td>
                    <td>${player.stats.pitching.inningsPitched}</td>
                    <td>${player.stats.pitching.hits}</td>
                    <td>${player.stats.pitching.runs}</td>
                    <td>${player.stats.pitching.earnedRuns}</td>
                    <td>${player.stats.pitching.baseOnBalls}</td>
                    <td>${player.stats.pitching.strikeOuts}</td>
                </tr>
            `;
        }
    }

    html += `</table>`;
    return html;
}

function buildLineScore(lineData, boxData) {

    if (lineData.innings.length === 0) {
        return "<p>Game has not started yet</p>";
    }

    let html = `<h2>Line Score</h2><table><tr><th>Team</th>`;

    lineData.innings.forEach((inning, i) => {
        html += `<th>${i + 1}</th>`;
    });

    html += `<th>R</th><th>H</th><th>E</th></tr>`;

    ["away", "home"].forEach(side => {
        html += `<tr><td>${boxData.teams[side].team.teamName}</td>`;

        lineData.innings.forEach(inning => {
            html += `<td>${inning[side].runs ?? 0}</td>`;
        });

        html += `
            <td>${lineData.teams[side].runs}</td>
            <td>${lineData.teams[side].hits}</td>
            <td>${lineData.teams[side].errors}</td>
        </tr>`;
    });

    html += `</table>`;
    return html;
}

function displayFullGame(boxData, lineData, liveData) {

    let venue = "N/A";
    let attendance = "N/A";
    let firstPitch = "N/A";
    let timeOfGame = "N/A";
    let weather = "N/A";
    let wind = "N/A";

    boxData.info.forEach((info,i) => {
        const label = info.label;
        const xlabel = info.value;
        if (info.label === "Venue") {
            venue = info.value;
        } else if (info.label === "Att") {
            attendance = info.value;
        } else if (info.label === "First pitch") {
            firstPitch = info.value;
        } else if (info.label === "T") {
            timeOfGame = info.value;
        } else if (info.label === "Weather") {
            weather = info.value;
        } else if (info.label === "Wind") {
            wind = info.value;
        }
    });
    
    if (!attendance) {
        attendance = "N/A";
    }
    if (!weather) {
        weather = "N/A";
    }
    if (!wind) {
        wind = "N/A";
    }
    if (!firstPitch) {
        firstPitch = "N/A";
    }
    if (!timeOfGame) {
        timeOfGame = "N/A";
    }
    if (!venue) {
        venue = "N/A";
    }
    document.getElementById("gameInfo").innerText =
        `${venue} | Attendance: ${attendance}`;
    document.getElementById("weatherInfo").innerText =
        `Weather: ${weather} | Wind: ${wind}`;
    document.getElementById("timeInfo").innerText =
        `First Pitch: ${firstPitch} | Time of Game: ${timeOfGame}`;

    const home = boxData.teams.home;
    const away = boxData.teams.away;

    const phillies = home.team.id === 143 ? home : away;
    const opponent = home.team.id === 143 ? away : home;

    /*const attendance = boxData.gameData.gameInfo.attendance || "N/A";*/

    const today = new Date();
    formattedDate = today.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
    });
   
    /*attendance = "N/A";*/

    document.title = `Phillies Box Score - ${formattedDate}`;
    document.getElementById("pageTitle").innerText =
        `Phillies Box Score - ${formattedDate}`;

    /*document.getElementById("gameInfo").innerHTML =
        `${formattedTime} | ${venue} | Attendance: ${attendance}`;*/

    // Logos
    document.getElementById("logos").innerHTML = `
        <img src="https://www.mlbstatic.com/team-logos/${phillies.team.id}.svg">
        <img src="https://www.mlbstatic.com/team-logos/${opponent.team.id}.svg">
    `;

    // Decisions
    let decisionsHTML = "";
    if (liveData.liveData.decisions) {
        decisionsHTML = `
            <div><strong>WP:</strong> ${liveData.liveData.decisions.winner?.fullName || "N/A"}</div>
            <div><strong>LP:</strong> ${liveData.liveData.decisions.loser?.fullName || "N/A"}</div>
            <div><strong>Save:</strong> ${liveData.liveData.decisions.save?.fullName || "None"}</div>
        `;
    }

    let html = `
        <div class="box-container">

            <div class="score">
                ${phillies.team.name} ${phillies.teamStats.batting.runs} - 
                ${opponent.team.name} ${opponent.teamStats.batting.runs}
            </div>

            ${decisionsHTML}

            ${buildLineScore(lineData, boxData)}

            <h2>${phillies.team.name} Batting</h2>
            ${buildBattingTable(phillies)}

            <h2>${phillies.team.name} Pitching</h2>
            ${buildPitchingTable(phillies)}

            <h2>${opponent.team.name} Batting</h2>
            ${buildBattingTable(opponent)}

            <h2>${opponent.team.name} Pitching</h2>
            ${buildPitchingTable(opponent)}

        </div>
    `;

    document.getElementById("boxscore").innerHTML = html;
}

loadGameData();

</script>

<button onclick="window.location.href='index.html'">
  Return to Did the Phillies Win Today?
</button>

</body>
</html>
